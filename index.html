<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LocalVault</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Frontend Differentiation Pass</p>
          <h1>LocalVault</h1>
          <p class="lede">
            Run featured listings, limited-time offers, and inbound local leads from one directory dashboard.
          </p>
        </div>
        <aside class="hero-card">
          <span>Marketplace flow</span>
          <strong>Listings to offers to leads</strong>
          <p>Built for local discovery, promotions, and business intake tracking.</p>
        </aside>
      </section>
      <nav class="subnav" aria-label="LocalVault views">
        <button class="subnav-tab active" data-tab="overview" type="button">Overview</button>
        <button class="subnav-tab" data-tab="directory" type="button">Directory</button>
        <button class="subnav-tab" data-tab="offers" type="button">Offers</button>
        <button class="subnav-tab" data-tab="leads" type="button">Leads</button>
      </nav>
      <section id="app" class="app-shell">
        <div class="loading-card">Loading LocalVault...</div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
